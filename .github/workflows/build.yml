name: Build APK

on:
  push:
    branches:
      - main  # Change if you want another branch

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Step 3: Ensure src/main.tsx exists
      - name: Check main.tsx file
        run: |
          if [ ! -f "./src/main.tsx" ]; then
            echo "Error: ./src/main.tsx not found! Make sure the path matches exactly."
            exit 1
          fi

      # Step 4: Install dependencies safely
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Step 5: Build web app
      - name: Build project
        run: npm run build

      # Step 6: Install Capacitor CLI
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      # Step 7: Copy web assets to Android
      - name: Copy web assets to Android
        run: npx cap copy android

      # Step 8: Build Android APK (debug)
      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      # Step 9: Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
