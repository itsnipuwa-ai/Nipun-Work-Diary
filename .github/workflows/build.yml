name: Build APK

on:
  push:
    branches:
      - main  # Change this if you want another branch

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'  # Match your local Node version

      # Step 3: Install dependencies (fix native binding issues)
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Step 4: Build web app
      - name: Build project
        run: npm run build

      # Step 5: Install Capacitor CLI (if using Capacitor)
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      # Step 6: Copy web assets into Android project
      - name: Copy web assets to Android
        run: npx cap copy android

      # Step 7: Build Android APK (debug)
      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      # Step 8: Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
