<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1C1917" />
    <link rel="manifest" href="/manifest.json" />
    <title>Nipun's Work Diary</title>

    <script>
      // Fix for libraries trying to overwrite window.fetch
      (function () {
        try {
          const originalFetch = window.fetch;
          const descriptor = Object.getOwnPropertyDescriptor(window, "fetch");

          if (originalFetch && descriptor?.get && !descriptor?.set) {
            Object.defineProperty(window, "fetch", {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("Fetch polyfill fix failed:", e);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>

    <!-- Vite entry file -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
